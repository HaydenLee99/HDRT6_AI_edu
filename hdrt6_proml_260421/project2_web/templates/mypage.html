<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>마이페이지 — 드론 비행 관리 시스템</title>

  <!-- 한글 웹폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <!-- 로그인/마이페이지 공통 폼 스타일 -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body class="auth-page">

  <!-- 상단 로고 (클릭 시 메인으로) -->
  <div class="mp-logo">
    <a href="/">
      <div class="logo-circle">
        <div class="logo-inner">
          <div class="logo-dot"></div>
        </div>
      </div>
      <div>
        <span class="logo-text">드론 비행 관리 시스템</span>
        <span class="logo-sub">안전한 드론 비행을 위한 통합 서비스</span>
      </div>
    </a>
  </div>

  <!-- 마이페이지 카드 -->
  <div class="mp-card">

    <!-- 카드 상단 헤더: 아이콘 + 제목 -->
    <div class="mp-card-header">
      <div class="mp-avatar">👤</div>
      <div>
        <div class="mp-card-header-title">마이페이지</div>
        <div class="mp-card-header-sub">계정 정보 및 드론 제원을 수정할 수 있습니다</div>
      </div>
    </div>

    <!-- 정보 수정 폼: /mypage/update 로 POST 전송 -->
    <form action="/mypage/update" method="post">
      <div class="mp-card-body">

        <!-- ─── 기본 정보 섹션 ─── -->
        <div class="mp-section">
          <div class="mp-section-title">👤 기본 정보</div>

          <!-- 아이디는 수정 불가 (readonly 속성으로 잠금) -->
          <div class="form-group">
            <label>아이디</label>
            <!-- Flask에서 login_id 변수로 현재 아이디 값 주입 -->
            <input type="text" name="login_id" value="{{ login_id }}" readonly/>
          </div>

          <!-- 비밀번호: 입력하지 않으면 기존 비밀번호 유지 (app.py 처리 로직 참고) -->
          <div class="form-group">
            <label>새 비밀번호</label>
            <input type="password" name="password" placeholder="변경 시에만 입력"/>
          </div>

          <!-- 이름 + 생년월일 (2열 배치) -->
          <div class="mp-row">
            <div class="form-group">
              <label>이름</label>
              <!-- {{ name }}: 현재 저장된 이름으로 미리 채워짐 -->
              <input type="text" name="name" value="{{ name }}"/>
            </div>

            <div class="form-group">
              <label>생년월일</label>
              <div class="birth-wrap">
                <!--
                  birth가 date 타입이면 strftime으로 YYYY-MM-DD 형식 변환
                  없으면 빈 문자열
                -->
                <input type="text" name="birth" id="birth-input"
                       placeholder="YYYY-MM-DD" maxlength="10"
                       value="{{ birth.strftime('%Y-%m-%d') if birth else '' }}"
                       oninput="formatBirth(this)"/>
                <!-- 숨겨진 달력 팝업 트리거 -->
                <input type="date" id="birth-picker"
                       style="position:absolute; opacity:0; pointer-events:none; width:0; height:0;"/>
                <button type="button" class="btn-cal" onclick="openBirthPicker()" title="달력으로 선택">📅</button>
              </div>
            </div>
          </div>

          <!-- 전화번호 (자동 하이픈 포맷팅) -->
          <div class="form-group">
            <label>전화번호</label>
            <input type="text" name="phone" value="{{ phone }}" placeholder="010-0000-0000" oninput="pmFormatPhone(this)"/>
          </div>
        </div>

        <!-- ─── 드론 제원 섹션 ─── -->
        <div class="mp-section">
          <div class="mp-section-title">🚁 드론 제원</div>

          <!-- 드론 종류 선택 -->
          <div class="form-group">
            <label>드론 종류</label>
            <select name="drone_type">
              <!-- 현재 저장된 drone_type과 일치하는 option에 selected 속성 추가 -->
              <option value=""             {% if not drone_type %}selected{% endif %}>선택 안함</option>
              <option value="무인멀티콥터" {% if drone_type == '무인멀티콥터' %}selected{% endif %}>무인멀티콥터</option>
              <option value="무인비행기"   {% if drone_type == '무인비행기'   %}selected{% endif %}>무인비행기</option>
            </select>
          </div>

          <!-- 드론 무게 + 크기 (2열) -->
          <div class="mp-row">
            <div class="form-group">
              <label>드론 무게 <span class="unit-badge">kg</span></label>
              <input type="text" name="weight" value="{{ weight }}" placeholder="예: 1.2"/>
            </div>
            <div class="form-group">
              <label>드론 크기 <span class="unit-badge">cm</span></label>
              <input type="text" name="size" value="{{ size }}" placeholder="예: 35" oninput="formatCm(this)"/>
            </div>
          </div>

          <!-- 최대 이륙중량 -->
          <div class="form-group">
            <label>최대 이륙중량 <span class="unit-badge">kg</span></label>
            <input type="text" name="max_takeoff_weight" value="{{ max_takeoff_weight }}" placeholder="예: 2.0"/>
          </div>
        </div>

      </div>

      <!-- 하단 버튼 영역 -->
      <div class="mp-card-footer" style="padding:0 28px 28px; display:flex; gap:10px;">
        <!-- 돌아가기: 폼 제출 없이 메인으로 이동 (type="button") -->
        <button type="button" class="btn-logout"
                style="width:auto; padding:9px 20px; white-space:nowrap;"
                onclick="location.href='/'">← 돌아가기</button>
        <!-- 저장 버튼: 폼 제출 → /mypage/update POST -->
        <button type="submit" class="btn-save" style="flex:1;">정보 저장</button>
      </div>
    </form>

  </div>

  <!--
    마이페이지용 JS
    - 생년월일 달력 연동 (openBirthPicker, formatBirth)
    - 전화번호 자동 하이픈 (pmFormatPhone)
    - cm 단위 자동 추가 (formatCm)
  -->
  <script src="{{ url_for('static', filename='js/auth_forms.js') }}"></script>

</body>
</html>
